name: Deploy Documentation
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            mkdir -p /var/www/vaultwares-docs
            cd /var/www/vaultwares-docs
            if [ ! -d ".git" ]; then
              git init
              git remote add origin https://github.com/vaultwares/vaultwares-docs.git
            fi
            git pull origin main
            npm install
            npm run build
            pm2 restart vaultwares-docs || pm2 serve dist 8080 --name "vaultwares-docs" --spa
