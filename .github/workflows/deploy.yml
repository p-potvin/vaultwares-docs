name: Deploy Documentation
on:
  push:
    branches:
      - main

jobs:
  deploy:
    # Tailnet Lock blocks GitHub-hosted runners from joining the tailnet.
    # This workflow is intended to run on the GreenCloud VPS runner only.
    runs-on: [self-hosted, greencloud-vps]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build
        run: |
          npm ci
          npm run build

      - name: Deploy (local)
        run: |
          mkdir -p /var/www/vaultwares-docs
          rm -rf /var/www/vaultwares-docs/dist
          cp -R dist /var/www/vaultwares-docs/dist
          # Nginx serves from /var/www/vaultwares-docs/dist
